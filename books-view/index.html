<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Books View</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: center;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .header-inner {
            display: grid;
            grid-template-columns: 3fr 1.2fr;
            /* ←ここがポイント */
            align-items: center;
        }

        select {
            font-size: 40px;
            padding: 4px 4px 4px 8px;
        }

        .count {
            font-size: 36px;
            color: #666;
            text-align: right;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .card {
            text-align: center;
        }

        .cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 6px;
        }

        .rating {
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-inner">
            <select id="monthSelect"></select>
            <span id="count" class="count"></span>
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <script src="script.js"></script>
</body>

</html>

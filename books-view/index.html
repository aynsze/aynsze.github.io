<!DOCTYPE html>
<html lang="ja">
<!-- grid可変ver -->

<head>
    <meta charset="UTF-8">
    <title>Books View</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
            margin: 0;
            padding-bottom: 60px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        select {
            font-size: 16px;
            padding: 4px 8px;
        }

        .count {
            font-size: 14px;
            color: #666;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .card {
            text-align: center;
        }

        .cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 6px;
        }

        .rating {
            font-size: 14px;
            margin-top: 4px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 8px;
            box-shadow: 0 -2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            accent-color: #e0e7ff;
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <select id="monthSelect"></select>
            <span id="count" class="count"></span>
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <div class="footer">
        <input type="range" id="columnRange" min="3" max="5" value="3">
    </div>

    <script src="script.js"></script>
</body>

</html>
